<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/" />
    <title>Redirecting...</title>
    <script>
      // Generic GitHub Pages SPA fallback without hardcoded repo name.
      var parts = location.pathname.split('/').filter(Boolean);
      var base = parts.length > 0 ? '/' + parts[0] + '/' : '/';
      var redirectUrl = base + (location.search || '') + (location.hash || '');
      location.replace(redirectUrl);
    </script>
  </head>
  <body>
    <p>Redirecting to the app... If you are not redirected automatically, <a href="/">click here</a>.</p>
  </body>
</html>
